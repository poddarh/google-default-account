<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #202124;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .container {
      width: 240px;
      text-align: center;
      color: white;
      padding: 12px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    .rows {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .row {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }
    .icon {
      width: 25px;
      height: 25px;
      margin: 0 5px;
    }
    input {
      height: 20px;
      width: 50px;
      margin: 0 5px;
    }
    p {
      font-size: 12px;
      color: #9aa0a6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Google Default Account</h1>
    <div class="rows">
      <div class="row">
        <img class="icon" src="icons/meet.png">
        <input type="number" data-service="Meet" min="0">
      </div>
      <div class="row">
        <img class="icon" src="icons/google-photos.png">
        <input type="number" data-service="Photo" min="0">
      </div>
      <div class="row">
        <img class="icon" src="icons/gmail.png">
        <input type="number" data-service="Mail" min="0">
      </div>
      <div class="row">
        <img class="icon" src="icons/google-drive.png">
        <input type="number" data-service="Drive" min="0">
      </div>
      <div class="row">
        <img class="icon" src="icons/youtube.png">
        <input type="number" data-service="Youtube" min="0">
      </div>
      <div class="row">
        <img class="icon" src="icons/google-chat.png">
        <input type="number" data-service="Chat" min="0">
      </div>
      <div class="row">
        <img class="icon" src="icons/google-maps.png">
        <input type="number" data-service="Maps" min="0">
      </div>
    </div>
    <p>Set default account index, eg: 0, 1, 2...</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
