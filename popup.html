<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #1f2024;
      --surface: #2a2c31;
      --surface-hover: #34373d;
      --border: #3c4046;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #8ab4f8;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      font-size: 13px;
    }
    .container {
      width: 320px;
      padding: 16px 16px 12px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.2px;
    }
    .column-header {
      display: grid;
      grid-template-columns: 28px 1fr 60px 50px;
      align-items: center;
      gap: 10px;
      padding: 0 8px 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .column-header .ch-acct { text-align: center; }
    .column-header .ch-deep { text-align: center; }
    .rows {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .row {
      display: grid;
      grid-template-columns: 28px 1fr 60px 50px;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 120ms ease;
    }
    .row:hover { background: var(--surface); }
    .icon {
      width: 22px;
      height: 22px;
      display: block;
    }
    .name {
      font-size: 13px;
      color: var(--text);
    }
    .acct {
      display: flex;
      justify-content: center;
    }
    input[type=number] {
      width: 56px;
      height: 28px;
      padding: 0 8px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      transition: border-color 120ms ease, background 120ms ease;
      -moz-appearance: textfield;
    }
    .row:hover input[type=number] { background: var(--surface-hover); }
    input[type=number]:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface-hover);
    }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .deep {
      display: flex;
      justify-content: center;
    }
    .deep input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      position: relative;
      margin: 0;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .deep input[type=checkbox]:hover { border-color: var(--accent); }
    .deep input[type=checkbox]:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .deep input[type=checkbox]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .deep input[type=checkbox]:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #1f2024;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }
    footer p { margin: 0 0 6px; }
    footer p:last-child { margin-bottom: 0; }
    footer kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Google Default Account</h1></header>

    <div class="column-header">
      <span></span>
      <span>Service</span>
      <span class="ch-acct">Acct</span>
      <span class="ch-deep" title="Rewrite links that already point at a specific account, not just the root URL">Links</span>
    </div>

    <div class="rows">
      <div class="row">
        <img class="icon" src="icons/meet.png" alt="">
        <span class="name">Meet</span>
        <div class="acct"><input type="number" data-service="Meet" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Meet" data-option="DeepLink" title="Rewrite Meet links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/google-photos.png" alt="">
        <span class="name">Photos</span>
        <div class="acct"><input type="number" data-service="Photo" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Photo" data-option="DeepLink" title="Rewrite Photos links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/gmail.png" alt="">
        <span class="name">Gmail</span>
        <div class="acct"><input type="number" data-service="Mail" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Mail" data-option="DeepLink" title="Rewrite Gmail message/thread links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/google-drive.png" alt="">
        <span class="name">Drive</span>
        <div class="acct"><input type="number" data-service="Drive" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Drive" data-option="DeepLink" title="Rewrite Drive file/folder links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/youtube.png" alt="">
        <span class="name">YouTube</span>
        <div class="acct"><input type="number" data-service="Youtube" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Youtube" data-option="DeepLink" title="Rewrite YouTube video/channel links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/google-chat.png" alt="">
        <span class="name">Chat</span>
        <div class="acct"><input type="number" data-service="Chat" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Chat" data-option="DeepLink" title="Rewrite Chat room/DM/thread links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/google-maps.png" alt="">
        <span class="name">Maps</span>
        <div class="acct"><input type="number" data-service="Maps" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Maps" data-option="DeepLink" title="Rewrite Maps place/search links to use this account"></div>
      </div>
      <div class="row">
        <img class="icon" src="icons/google-calendar.png" alt="">
        <span class="name">Calendar</span>
        <div class="acct"><input type="number" data-service="Calendar" min="0" placeholder="—"></div>
        <div class="deep"><input type="checkbox" data-service="Calendar" data-option="DeepLink" title="Rewrite Calendar event links to use this account"></div>
      </div>
    </div>

    <footer>
      <p><strong>Acct</strong> — account index (<kbd>0</kbd> is the first signed-in account). Leave blank to disable.</p>
      <p><strong>Links</strong> — also rewrite shared links (rooms, threads, events, etc.) that already point at a specific account. On by default.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
